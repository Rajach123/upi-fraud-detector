<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPI Fraud Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; padding: 20px; }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 20px; font-size: 24px; }

    .stats { display: flex; gap: 15px; margin-bottom: 25px; }
    .stat-box { flex: 1; background: #1a1a2e; border-radius: 10px; padding: 15px; text-align: center; }
    .stat-box h2 { font-size: 28px; margin-bottom: 5px; }
    .stat-box p { color: #888; font-size: 13px; }
    .total h2 { color: #00d4ff; }
    .fraud h2 { color: #ff4444; }
    .safe h2 { color: #00cc66; }

    .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
    #startBtn { background: #00cc66; color: #fff; }
    #stopBtn { background: #ff4444; color: #fff; }
    #clearBtn { background: #555; color: #fff; }

    .alert-box { background: #ff000022; border: 2px solid #ff4444; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 20px; display: none; text-align: center;
      color: #ff4444; font-size: 16px; font-weight: bold; animation: blink 1s infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 10px; overflow: hidden; }
    th { background: #16213e; padding: 12px; text-align: left; color: #00d4ff; font-size: 13px; }
    td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid #ffffff11; }
    .fraud-row { background: #ff000015; }
    .safe-row { background: #00cc6608; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge-fraud { background: #ff4444; color: #fff; }
    .badge-safe { background: #00cc66; color: #fff; }
  </style>
</head>
<body>

  <h1>🛡️ UPI Fraud Detector — Live Dashboard</h1>

  <div class="stats">
    <div class="stat-box total"><h2 id="totalCount">0</h2><p>Total Transactions</p></div>
    <div class="stat-box fraud"><h2 id="fraudCount">0</h2><p>Fraud Detected</p></div>
    <div class="stat-box safe"><h2 id="safeCount">0</h2><p>Safe Transactions</p></div>
  </div>

  <div class="controls">
    <button id="startBtn" onclick="startStream()">▶ Start Live Feed</button>
    <button id="stopBtn" onclick="stopStream()">⏹ Stop</button>
    <button id="clearBtn" onclick="clearAll()">🗑 Clear</button>
  </div>

  <div class="alert-box" id="alertBox">🚨 FRAUD DETECTED! Suspicious transaction flagged!</div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Amount (₹)</th>
        <th>Hour</th>
        <th>Status</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody id="txnBody"></tbody>
  </table>

  <script>
    let interval = null;
    let count = 0, frauds = 0, safes = 0;

    async function checkTransaction(amount, hour) {
      const res = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, hour })
      });
      return await res.json();
    }

    async function addTransaction() {
      const amount = Math.floor(Math.random() * 50000) + 100;
      const hour = Math.floor(Math.random() * 24);
      const data = await checkTransaction(amount, hour);

      count++;
      if (data.is_fraud) { frauds++; showAlert(); }
      else safes++;

      document.getElementById("totalCount").textContent = count;
      document.getElementById("fraudCount").textContent = frauds;
      document.getElementById("safeCount").textContent = safes;

      const tbody = document.getElementById("txnBody");
      const row = document.createElement("tr");
      row.className = data.is_fraud ? "fraud-row" : "safe-row";
      row.innerHTML = `
        <td>${count}</td>
        <td>₹${amount.toLocaleString()}</td>
        <td>${hour}:00</td>
        <td><span class="badge ${data.is_fraud ? 'badge-fraud' : 'badge-safe'}">${data.is_fraud ? '🚨 FRAUD' : '✅ SAFE'}</span></td>
        <td>${data.message}</td>
      `;
      tbody.insertBefore(row, tbody.firstChild);
    }

    function showAlert() {
      const box = document.getElementById("alertBox");
      box.style.display = "block";
      setTimeout(() => box.style.display = "none", 3000);
    }

    function startStream() {
      if (interval) return;
      interval = setInterval(addTransaction, 2000);
      addTransaction();
    }

    function stopStream() {
      clearInterval(interval);
      interval = null;
    }

    function clearAll() {
      stopStream();
      count = 0; frauds = 0; safes = 0;
      document.getElementById("totalCount").textContent = 0;
      document.getElementById("fraudCount").textContent = 0;
      document.getElementById("safeCount").textContent = 0;
      document.getElementById("txnBody").innerHTML = "";
    }
  </script>
</body>
</html>
